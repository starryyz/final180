{% extends "base.html" %}
{% block content %}
<h2>Manage Orders</h2>

<table>
    <tr>
        <th>ID</th><th>User</th><th>Status</th><th>Pickup</th><th>Created</th><th>Actions</th>
    </tr>
    {% for o in orders %}
    <tr>
        <td>{{ o.id }}</td>
        <td>{{ o.first_name }} {{ o.last_name }}</td>
        <td>{{ o.status }}</td>
        <td>{{ o.pickup_option }}</td>
        <td>{{ o.created_at }}</td>
        <td>
            <form method="POST" action="{{ url_for('admin_update_order_status', order_id=o.id) }}">
                <select name="status">
                    <option value="approved">Approve</option>
                    <option value="declined">Decline</option>
                    <option value="shipped">Shipped</option>
                </select>
                <button type="submit">Update</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
