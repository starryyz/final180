{% extends "base.html" %}
{% block content %}

<div class="profile-container">

    <h2 class="profile-title">Your Profile</h2>

    <form method="POST" enctype="multipart/form-data" class="profile-form">

        <div class="profile-pic-wrapper">
            <img src="{{ session.get('profile_pic', url_for('static', filename='images/default-profile.png')) }}" 
                 class="profile-page-img">
            <input type="file" name="profile_pic" accept="image/*">
        </div>

        <label>First Name</label>
        <input type="text" name="first_name" value="{{ user[1] }}">

        <label>Last Name</label>
        <input type="text" name="last_name" value="{{ user[2] }}">

        <label>Phone</label>
        <input type="text" name="phone" value="{{ user[3] }}">

        <label>Address</label>
        <input type="text" name="address" value="{{ user[4] }}">

        <button type="submit" class="save-btn">Save Changes</button>
    </form>

    <!-- ⭐ LOGOUT BUTTON MOVED HERE ⭐ -->
    <div class="logout-wrapper">
        <a href="{{ url_for('logout') }}" class="logout-btn">Log Out</a>
    </div>

</div>

{% endblock %}
