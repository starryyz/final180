{% extends "base.html" %}
{% block content %}

<div class="profile-container">
    <h2 class="profile-title">Your Profile</h2>

    <form method="POST" enctype="multipart/form-data" class="profile-form">
        <div class="profile-pic-wrapper">
            <img src="{{ session.get('profile_pic', url_for('static', filename='images/default-profile.png')) }}" 
                 class="profile-page-img">
            <input type="file" name="profile_pic" accept="image/*" class="file-input">
        </div>

        <div class="input-group">
            <label>First Name</label>
            <input type="text" name="first_name" value="{{ user[1] }}" placeholder="Enter first name">
        </div>

        <div class="input-group">
            <label>Last Name</label>
            <input type="text" name="last_name" value="{{ user[2] }}" placeholder="Enter last name">
        </div>

        <div class="input-group">
            <label>Phone</label>
            <input type="text" name="phone" value="{{ user[3] }}" placeholder="Enter phone number">
        </div>

        <div class="input-group">
            <label>Address</label>
            <input type="text" name="address" value="{{ user[4] }}" placeholder="Enter address">
        </div>

        <div class="logout-wrapper">
            <button type="submit" class="save-btn">Save Changes</button>
            <a href="{{ url_for('logout') }}" class="logout-btn">Log Out</a>
            <a href="{{ url_for('dashboard') }}" class="back-btn">Back</a>
        </div>
    </form>
</div>

{% endblock %}
