<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blooming Seeds</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>

    <!-- Always show brand section -->
    <nav class="lux-nav">
        <div class="nav-left">
            <img src="/static/images/logo.jpeg" class="lux-logo">
            <span class="lux-brand">Blooming Seeds</span>

            {% if request.endpoint not in ['login', 'signup'] and request.endpoint != 'dashboard' %}
                <a href="{{ url_for('dashboard') }}" class="lux-nav-link">Home</a>
            {% endif %}
        </div>

        <div class="nav-right">
            {% if request.endpoint not in ['login', 'signup'] %}
                {% if session.get("user_id") %}
                    <span class="nav-username">{{ session.get('user_name') }}</span>

                    <a href="{{ url_for('profile') }}" class="profile-btn">
                        <img 
                            src="{{ session.get('profile_pic', url_for('static', filename='images/default-profile.png')) }}"
                            class="profile-img"
                            alt="Profile"
                        >
                    </a>
                {% endif %}
            {% endif %}
        </div>
    </nav>

    {% block content %}{% endblock %}

</body>
</html>
