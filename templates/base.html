<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blooming Seeds</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="icon" type="image/x-icon" href="static/images/icon.png">
<link href="https://fonts.googleapis.com/css2?family=Autour+One&family=DynaPuff:wght@400..700&display=swap" rel="stylesheet">
</head>

<body>
<nav class="lux-nav">
    <div class="nav-left">
        <a href="{{ url_for('dashboard') }}">
            <img src="/static/images/logo.png" class="logo" alt="Logo">
        </a>
    </div>

    {% if request.endpoint != 'login' %}
    <div class="nav-right">
        <span class="nav-link">
            <a href="{{ url_for('dashboard') }}">Home</a>
        </span>

        <span class="nav-link">
            <a href="#">Contact Us</a>
        </span>

        <span class="nav-link">
            {% if session.get("user_id") %}
                <a href="{{ url_for('logout') }}">Logout ({{ session.get('user_name') }})</a>
                <a href="{{ url_for('cart') }}">
                    <ion-icon name="cart-outline"></ion-icon>
                </a>
            {% else %}
                <a href="{{ url_for('login') }}">Login</a>
            {% endif %}
        </span>

        <a href="{{ url_for('profile') }}" class="profile-btn">
            <img src="{{ session.get('profile_pic', url_for('static', filename='images/default-profile.png')) }}" 
                 class="profile-img">
        </a>
    </div>
    {% endif %}
</nav>

{% block content %}{% endblock %}
</body>
</html>
